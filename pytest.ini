[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    smoke: Basic availability and health checks — run first, fail fast
    contract: API contract and schema validation — verifies interface stability
    integrity: Data integrity and consistency — defines migration success criteria
    slow: Long-running tests (>5s) — skip with -m "not slow"

# Treat unregistered markers as warnings, not errors
filterwarnings =
    ignore::DeprecationWarning:psycopg2
    ignore::DeprecationWarning:urllib3
